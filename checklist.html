<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Checklist</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --danger: #ef4444;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            background: var(--primary);
            color: white;
            padding: 30px;
            text-align: center;
        }

        h1 { font-size: 1.8rem; margin-bottom: 5px; }
        p.subtitle { opacity: 0.9; font-size: 0.9rem; }

        .stats-container {
            display: flex;
            justify-content: space-around;
            background: rgba(255,255,255,0.1);
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
        }

        .stat-item { text-align: center; }
        .stat-value { font-weight: bold; font-size: 1.2rem; display: block; }
        .stat-label { font-size: 0.75rem; opacity: 0.8; }

        .input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #eee;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus { border-color: var(--primary); }

        button.add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button.add-btn:hover { background: var(--primary-hover); }

        ul { list-style: none; padding: 0; max-height: 400px; overflow-y: auto; }

        li {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #f3f4f6;
            transition: background 0.2s;
        }

        li:hover { background: #f9fafb; }

        li.completed span {
            text-decoration: line-through;
            color: var(--text-light);
        }

        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            margin-right: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        li.completed .checkbox {
            background: var(--primary);
        }

        li.completed .checkbox::after {
            content: '✓';
            color: white;
            font-size: 14px;
        }

        .task-text { flex: 1; cursor: pointer; }

        .delete-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            font-size: 1.2rem;
            padding: 5px;
        }

        li:hover .delete-btn { opacity: 1; }

        .footer-actions {
            padding: 15px 20px;
            background: #f9fafb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .clear-btn {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            text-decoration: underline;
        }

        .clear-btn:hover { color: var(--danger); }

        /* Progress Bar */
        .progress-container {
            height: 4px;
            background: #e5e7eb;
            width: 100%;
        }
        .progress-bar {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 0.3s ease;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    
    <header>
        <h1>My Checklist</h1>
        <p class="subtitle">Stay organized, get things done</p>
        
        <div class="stats-container">
            <div class="stat-item">
                <span class="stat-value" id="totalStats">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="completedStats">0</span>
                <span class="stat-label">Done</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="remainingStats">0</span>
                <span class="stat-label">Left</span>
            </div>
        </div>
    </header>

    <div class="input-area">
        <input type="text" id="taskInput" placeholder="Add a new task..." autocomplete="off">
        <button class="add-btn" onclick="addTask()">Add</button>
    </div>

    <ul id="taskList">
        <!-- Tasks will appear here -->
    </ul>

    <div class="footer-actions" id="footerActions" style="display: none;">
        <span id="pendingText">0 tasks pending</span>
        <button class="clear-btn" onclick="clearCompleted()">Clear Completed</button>
    </div>
</div>

<script>
    // State management
    let tasks = JSON.parse(localStorage.getItem('myChecklistTasks')) || [];

    // DOM Elements
    const taskInput = document.getElementById('taskInput');
    const taskList = document.getElementById('taskList');
    const progressBar = document.getElementById('progressBar');
    const totalStats = document.getElementById('totalStats');
    const completedStats = document.getElementById('completedStats');
    const remainingStats = document.getElementById('remainingStats');
    const footerActions = document.getElementById('footerActions');
    const pendingText = document.getElementById('pendingText');

    // Initialize
    renderTasks();

    // Add task on Enter key
    taskInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') addTask();
    });

    function addTask() {
        const text = taskInput.value.trim();
        if (text === '') return;

        const newTask = {
            id: Date.now(),
            text: text,
            completed: false
        };

        tasks.push(newTask);
        saveAndRender();
        taskInput.value = '';
        taskInput.focus();
    }

    function toggleTask(id) {
        tasks = tasks.map(task => 
            task.id === id ? { ...task, completed: !task.completed } : task
        );
        saveAndRender();
    }

    function deleteTask(id) {
        tasks = tasks.filter(task => task.id !== id);
        saveAndRender();
    }

    function clearCompleted() {
        tasks = tasks.filter(task => !task.completed);
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem('myChecklistTasks', JSON.stringify(tasks));
        renderTasks();
    }

    function renderTasks() {
        taskList.innerHTML = '';
        
        if (tasks.length === 0) {
            taskList.innerHTML = `
                <div class="empty-state">
                    <p>No tasks yet!</p>
                    <p>Add one above to get started.</p>
                </div>
            `;
            footerActions.style.display = 'none';
            updateStats();
            return;
        }

        tasks.forEach(task => {
            const li = document.createElement('li');
            li.className = task.completed ? 'completed' : '';
            
            li.innerHTML = `
                <div class="checkbox" onclick="toggleTask(${task.id})"></div>
                <span class="task-text" onclick="toggleTask(${task.id})">${escapeHtml(task.text)}</span>
                <button class="delete-btn" onclick="deleteTask(${task.id})">&times;</button>
            `;
            taskList.appendChild(li);
        });

        footerActions.style.display = 'flex';
        updateStats();
    }

    function updateStats() {
        const total = tasks.length;
        const completed = tasks.filter(t => t.completed).length;
        const remaining = total - completed;
        const percentage = total === 0 ? 0 : (completed / total) * 100;

        totalStats.textContent = total;
        completedStats.textContent = completed;
        remainingStats.textContent = remaining;
        progressBar.style.width = `${percentage}%`;
        
        pendingText.textContent = `${remaining} task${remaining !== 1 ? 's' : ''} pending`;
    }

    // Security helper to prevent XSS
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>

</body>
</html>
